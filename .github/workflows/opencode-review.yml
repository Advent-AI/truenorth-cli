name: OpenCode Review (MiniMax)

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    if: |
      github.event_name == 'pull_request' ||
      contains(github.event.comment.body, '/oc')
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run OpenCode with MiniMax
        uses: anomalyco/opencode/github@0cf0294787322664c6d668fa5ab0a9ce26796f78 # pinned for supply chain security
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        with:
          model: minimax/MiniMax-M2.7
          agent: plan
          use_github_token: true
          prompt: |
            IMPORTANT: This is a READ-ONLY review. Do NOT modify, commit, or push any files.
            Do NOT use Edit/Write/Bash tools to make changes.
            Your only output is inline review comments and a summary, posted via the GitHub API.

            Review this pull request with focus on code quality and readability.

            ## Review Checklist

            ### Readability
            - Are variable and function names descriptive and self-documenting?
            - Are functions short and focused (ideally < 50 lines)?
            - Is there deeply nested code (> 3 levels) that should be flattened?
            - Are there magic numbers or unclear constants that need named variables?
            - Is the control flow easy to follow?

            ### Code Quality
            - Are there potential bugs or logic errors?
            - Is error handling appropriate (not too broad, not missing)?
            - Are there unnecessary complexity or over-engineering?
            - Do functions have too many parameters (> 5)?
            - Are there duplicated code blocks that should be extracted?

            ### TypeScript / Project Conventions
            - Are type annotations present and accurate?
            - Are interfaces used for structured data (not `any` or `unknown` where avoidable)?
            - Are ESM imports used with `.js` extensions?
            - Is error handling consistent (wrapAction pattern)?
            - Are there hardcoded values that should be configurable?

            ## Instructions
            - Post inline comments on specific lines where issues are found.
            - For each issue, explain WHY it hurts readability and suggest a concrete fix.
            - Prioritize: bugs > readability > style > minor nits.
            - Do NOT comment on things that are already clean and readable.
            - Keep the summary section brief; put details in inline comments.
